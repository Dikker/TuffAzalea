<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Dashboard</title>
    <style>
        :root {
            --bg-dark: #d8e9e5;
            --sidebar-bg: #1A322C;
            --accent-gold: #195a32;
            --card-bg: #ffffff;
            --text-light: #e0e0e0;
            --header-gold: #000000;
            
        }

        :root {
            /* Teal / Blue-Green */
            --teal-darkest: #00353D;
            --teal-darker: #041B1A;
            --teal-dark: #061819;
            --teal-base: #0A494F;
            --teal-alt: #0C4B4F;
            --teal-deep: #073235;
            --teal-muted: #09322F;
            
            /* Blue-Teal / Cyan */
            --cyan-dark: #185074;
            --cyan-base: #1A6C85;
            --cyan-light: #11767D;
            --cyan-lighter: #227F92;
            --cyan-soft: #43707C;
            --cyan-pale: #7FB2AC;
            
            /* Green-Teal */
            --green-dark: #1A322C;
            --green-base: #23473D;
            
            /* Dark Neutrals */
            --black-soft: #090B0F;
            --black-muted: #0D1316;
            --black-alt: #101C1C;
            
            /* Earth / Warm Neutrals */
            --olive-dark: #5A5A4C;
            --olive-base: #726B59;
            --olive-muted: #797D63;
            --olive-light: #A09577;
            --olive-soft: #9C9674;
            --olive-alt: #9F9677;

            --alert: #ff5555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow: hidden;
        }

        /* Sidebar Navigation */
        nav {
            width: 260px;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ffffff;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 60px;
            padding-bottom: 20px;
            border-bottom: 1px solid #3d424d;
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 2px solid var(--accent-gold);
            flex-shrink: 0;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
            padding-left: 10px;
        }

        .nav-links li:hover {
            color: rgb(160, 252, 255);
            transform: translateX(8px);
        }

        /* Main Content Area */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        header {
            padding: 25px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            background-color: var(--bg-dark);
            z-index: 5;
        }

        header h1 {
            color: var(--header-gold);
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Rotating Cog & Dropdown */
        .settings-container {
            position: absolute;
            right: 40px;
            display: inline-block;
        }

        .cog-icon {
            width: 28px;
            height: 28px;
            background-color: #195a32;
            position: relative;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
        }

        /* Cog Teeth */
        .cog-icon::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 3px;
            border: 5px dotted var(--text-light);
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        /* Inner Circle */
        .cog-icon::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 8px; height: 8px;
            background-color: var(--bg-dark);
            border-radius: 50%;
        }

        .settings-container:hover .cog-icon {
            transform: rotate(90deg);
            background-color: var(--accent-gold);
        }

        .settings-container:hover .cog-icon::before {
            border-color: var(--accent-gold);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 35px;
            background-color: var(--card-bg);
            min-width: 160px;
            box-shadow: 0px 12px 24px rgba(0,0,0,0.5);
            border-radius: 8px;
            z-index: 10;
            overflow: hidden;
            border: 1px solid #444;
            animation: fadeIn 0.9s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-content a {
            color: var(--text-light);
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            transition: background 0.9s;
        }

        .dropdown-content a:hover {
            background-color: #3e4451;
            color: var(--accent-gold);
        }

        .settings-container:hover .dropdown-content {
            display: block;
        }

        /* Dashboard Feed */
        .content {
            padding: 20px 40px 60px;
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
        }

        .post-btn {
            background-color: #ffffff;
            border: none;
            padding: 12px 45px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 40px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .post-btn:hover {
            background-color: #426d50;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        /* Post Card UI */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            margin-bottom: 40px;
            border: 1px solid #3d424d;
        }

        .card-header {
            background-color: var(--accent-gold);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #1a1c22;
        }

        .card-header span {
            font-weight: 700;
            font-size: 1rem;
        }

        .card-body {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-container {
            width: 100%;
            height: 350px;
            background-color: #c4c4c4;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin-bottom: 25px;
            color: #444;
            font-weight: 500;
            font-style: italic;
            border: 1px solid #aaa;
        }

        .description {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #ccc;
            text-align: center;
            max-width: 90%;
        }

        .location-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .location-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        /* Scrollbar Styling */
        main::-webkit-scrollbar {
            width: 8px;
        }
        main::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        main::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="user-profile">
            <div class="avatar">Profile</div>
            <div style="overflow: hidden;">
                <p style="font-weight: 700; font-size: 0.95rem;">User</p>
                <p style="opacity: 0.6; font-size: 0.75rem;">user@community.org</p>
            </div>
        </div>
        <ul class="nav-links">
            <li>HOME</li>
            <li>MAP</li>
            <li>PERFORMANCE</li>
        </ul>
    </nav>

    <main>
        <header>
            <h1>Community Dashboard</h1>
            <div class="settings-container">
                <div class="cog-icon"></div>
                <div class="dropdown-content">
                    <a href="#">Preferences</a>
                    <a href="#" style="border-top: 1px solid #444; color: var(--danger);">Logout</a>
                </div>
            </div>
        </header>

        <div class="content">
            <button class="post-btn">Post</button>

            <div class="card">
                <div class="card-header">
                    <div class="avatar" style="background: #fff; width: 34px; height: 34px; color: #1a1c22; border: none;">E</div>
                    <span>User</span>
                </div>
                <div class="card-body">
                    <div class="image-container">* Image Preview Area *</div>
                    <p class="description">
                        This is a description for a community update or shared post. 
                        The UI now features better contrast and rounded corners for a modern feel.
                    </p>
                    <a href="#" class="location-link">📍 View Pinned Location</a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
